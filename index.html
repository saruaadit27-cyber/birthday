<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Aadit Saru</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
background:#000;
color:white;
}

/* INTRO */
#intro{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
}

.dot{
width:12px;
height:12px;
background:white;
border-radius:50%;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{transform:scale(2);}
}

.cake{
font-size:120px;
opacity:0;
transform:scale(0);
animation:pop 1.2s forwards;
animation-delay:1s;
}

@keyframes pop{
70%{transform:scale(1.2);opacity:1;}
100%{transform:scale(1);opacity:1;}
}

.question{
font-size:32px;
margin-top:20px;
opacity:0;
animation:fade 1s forwards;
animation-delay:2s;
}

.btns{
margin-top:25px;
display:flex;
gap:20px;
opacity:0;
animation:fade 1s forwards;
animation-delay:2.7s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

button{
padding:14px 28px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
font-weight:bold;
}

#yesBtn{
background:white;
color:black;
transition:.3s;
z-index:2;
}

#yesBtn.big{
transform:scale(2.4);
background:#00ff88;
color:black;
box-shadow:0 0 30px #00ff88;
}

#noBtn{
background:red;
color:white;
position:fixed;
z-index:10;
}

.bubble{
position:absolute;
top:-65px;
left:-10px;
background:white;
color:red;
padding:8px 12px;
border-radius:15px;
font-weight:bold;
display:none;
}

/* MAIN */
#main{
display:none;
height:100vh;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff0080,#7928ca,#2afadf,#4facfe);
background-size:400% 400%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:left;}
100%{background-position:right;}
}

.box{
width:90%;
max-width:700px;
padding:40px;
text-align:center;
background:rgba(255,255,255,0.12);
border-radius:20px;
backdrop-filter:blur(15px);
}

#message{
font-size:26px;
min-height:200px;
padding:20px;
}

.text-anim{
animation:show .6s ease;
}

@keyframes show{
from{opacity:0;transform:translateY(20px);filter:blur(8px);}
to{opacity:1;transform:translateY(0);filter:blur(0);}
}

.mainBtn{
margin-top:15px;
padding:12px 25px;
border-radius:30px;
border:none;
font-size:20px;
cursor:pointer;
background:white;
color:#ff0080;
}

/* HEARTS */
.heart{
position:absolute;
font-size:22px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120px);opacity:0;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">

<div class="dot"></div>
<div class="cake">🎂</div>

<div class="question">Wish me Happy Birthday?</div>

<div class="btns">
<button id="yesBtn" onclick="startMain()">YES 💖</button>

<div style="position:relative;">
<button id="noBtn" onclick="moveNo()">NO</button>
<div class="bubble" id="bubble">Think Again!</div>
</div>

</div>
</div>

<!-- MAIN -->
<div id="main">
<div class="box">

<h1>🎂 HAPPY BIRTHDAY 🎂</h1>
<h2>AADIT SARU</h2>

<div id="message" class="text-anim">Click Next 💖</div>

<button class="mainBtn" onclick="nextWish()">Next ➜</button>

</div>
</div>

<script>

/* INTRO NO BUTTON EDGE MOVEMENT */
let count = 0;
let pos = 0;

function moveNo(){

let no = document.getElementById("noBtn");
let yes = document.getElementById("yesBtn");
let bubble = document.getElementById("bubble");

if(count >= 10){
no.style.display="none";
bubble.style.display="none";
yes.classList.add("big");
yes.innerHTML="YES 💖 YES 💖";
return;
}

let w = window.innerWidth - 120;
let h = window.innerHeight - 60;

let x, y;

/* EDGE CYCLE MOVEMENT */
if(pos === 0){ x = 20 + count*25; y = 20; }
if(pos === 1){ x = w; y = 20 + count*25; }
if(pos === 2){ x = w - count*25; y = h; }
if(pos === 3){ x = 20; y = h - count*25; }

pos = (pos + 1) % 4;

no.style.left = x + "px";
no.style.top = y + "px";

bubble.style.display="block";
bubble.innerHTML = "Think Again" + "!".repeat(count+1);

count++;
}

/* START MAIN */
function startMain(){
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="flex";
}

/* WISHES */
const wishes = [
"🎉 Happy Birthday Aadit Saru!",
"🎂 Wishing you endless happiness!",
"🌟 You are amazing!",
"🚀 Keep chasing dreams!",
"💖 Stay blessed always!",
"🎁 You deserve everything good!",
"🌈 Keep shining!",
"🎊 Another great year!",
"✨ You are special!",
"🏁 THE END 🎂"
];

let i = 0;
let msg = document.getElementById("message");

function next(){
if(i < wishes.length){
msg.classList.remove("text-anim");
void msg.offsetWidth;
msg.innerHTML = wishes[i];
msg.classList.add("text-anim");
i++;
}
}

/* HEARTS */
setInterval(()=>{
if(document.getElementById("main").style.display==="flex"){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(18+Math.random()*20)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
}
},400);

</script>

</body>
</html>
